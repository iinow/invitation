<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리의 결혼식에 초대합니다</title>
  <meta name="description" content="청첩장 확인하고 일정에 바로 추가해 주세요." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="우리의 결혼식에 초대합니다" />
  <meta property="og:description" content="아래 버튼으로 날짜를 캘린더에 바로 저장해 주세요." />
  <meta property="og:url" content="https://iinow.github.io/invitation/" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1200&q=80" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="우리의 결혼식에 초대합니다" />
  <meta name="twitter:description" content="청첩장 확인하고 일정에 바로 추가해 주세요." />
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1200&q=80" />
  <style>
    :root{
      --bg:#0f1020;
      --card:#171933cc;
      --text:#f5f7ff;
      --muted:#c8cef3;
      --accent:#ff7ab6;
      --accent2:#7ae2ff;
      --gold:#f6d365;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at 20% 0%, #23265a 0%, var(--bg) 40%, #080911 100%);color:var(--text);font-family:'Pretendard',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow-x:hidden}
    .bg-orb{position:fixed;inset:auto;filter:blur(60px);opacity:.35;z-index:-1;animation:float 9s ease-in-out infinite}
    .orb1{width:280px;height:280px;left:-80px;top:10vh;background:var(--accent)}
    .orb2{width:260px;height:260px;right:-60px;top:35vh;background:var(--accent2);animation-delay:1.5s}
    .orb3{width:220px;height:220px;left:35vw;bottom:-90px;background:var(--gold);animation-delay:3s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.05)}}

    .wrap{max-width:980px;margin:0 auto;padding:24px}
    .hero{padding:72px 18px 48px;text-align:center;position:relative}
    .badge{display:inline-block;padding:8px 14px;border:1px solid #ffffff30;border-radius:999px;background:#ffffff12;color:var(--muted);backdrop-filter: blur(6px)}
    h1{font-size:clamp(34px,7vw,64px);margin:18px 0 8px;letter-spacing:-.02em}
    .subtitle{font-size:clamp(16px,2.8vw,22px);color:var(--muted);margin:0}

    .card{background:var(--card);border:1px solid #ffffff22;border-radius:24px;backdrop-filter: blur(12px);box-shadow:0 18px 40px #00000040}

    .gallery{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:20px}
    .ph{position:relative;overflow:hidden;border-radius:20px;border:1px solid #ffffff2e;min-height:220px;background:#0f1228}
    .ph img{width:100%;height:100%;object-fit:cover;display:block;transform:scale(1.02);transition:transform .6s ease}
    .ph:hover img{transform:scale(1.08)}
    .ph::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#0000 60%,#0008 100%)}
    .ph span{position:absolute;left:12px;bottom:10px;z-index:2;font-size:13px;background:#0007;padding:4px 8px;border-radius:999px}
    .ph.a{grid-column:span 7;min-height:340px}
    .ph.b{grid-column:span 5}
    .ph.c{grid-column:span 4}
    .ph.d{grid-column:span 4}
    .ph.e{grid-column:span 4}

    .section{margin-top:26px;padding:26px}
    .title{font-size:22px;margin:0 0 8px}
    .desc{color:var(--muted);line-height:1.7;margin:0}

    .schedule{margin-top:18px;padding:20px;border-radius:16px;background:#ffffff0d;border:1px solid #ffffff26}
    .schedule .when{font-size:18px;font-weight:700;margin:6px 0}
    .schedule .where{color:var(--muted);margin:0 0 10px}
    .account{margin-top:18px;padding:20px;border-radius:16px;background:#ffffff0d;border:1px dashed #ffffff3a}
    .account .bank{font-weight:700;font-size:18px}
    .account .num{font-size:20px;letter-spacing:.02em;margin:6px 0 10px}
    .actions{display:flex;flex-wrap:wrap;gap:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border-radius:12px;text-decoration:none;color:#0d1027;background:linear-gradient(135deg,var(--accent),#ffb6d5);font-weight:700}
    .btn.secondary{background:linear-gradient(135deg,var(--accent2),#b7f2ff)}

    .footer{text-align:center;color:#b9c2ef;margin:30px 0 18px;font-size:14px}

    @media (max-width:760px){
      .wrap{padding:14px}
      .section{padding:18px}
      .ph.a,.ph.b,.ph.c,.ph.d,.ph.e{grid-column:span 12;min-height:220px}
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <main class="wrap">
    <section class="hero">
      <span class="badge">Wedding Invitation</span>
      <h1>우리의 특별한 하루에 초대합니다</h1>
      <p class="subtitle">소중한 분들과 함께 기쁨을 나누고 싶습니다</p>
    </section>

    <section class="card section">
      <h2 class="title">📸 Photo Moments</h2>
      <p class="desc">아래 영역에 원하는 사진으로 교체하면 바로 감성 청첩장으로 완성돼요.</p>
      <div class="gallery">
        <figure class="ph a"><img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=1400&q=80" alt="sample 1"><span>Sample 01</span></figure>
        <figure class="ph b"><img src="https://images.unsplash.com/photo-1460978812857-470ed1c77af0?auto=format&fit=crop&w=1000&q=80" alt="sample 2"><span>Sample 02</span></figure>
        <figure class="ph c"><img src="https://images.unsplash.com/photo-1501901609772-df0848060b33?auto=format&fit=crop&w=1000&q=80" alt="sample 3"><span>Sample 03</span></figure>
        <figure class="ph d"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=1000&q=80" alt="sample 4"><span>Sample 04</span></figure>
        <figure class="ph e"><img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?auto=format&fit=crop&w=1000&q=80" alt="sample 5"><span>Sample 05</span></figure>
      </div>

      <div class="schedule">
        <div class="bank">📅 일정 추가</div>
        <div class="when">2026.10.10 (토) 오후 12:00</div>
        <p class="where">예식장: 샘플 웨딩홀 (주소 입력 예정)</p>
        <div class="actions">
          <a class="btn secondary" href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=%EA%B2%B0%ED%98%BC%EC%8B%9D&dates=20261010T030000Z/20261010T050000Z&details=%EC%B2%AD%EC%B2%A9%EC%9E%A5%20%EC%9D%BC%EC%A0%95%EC%9E%85%EB%8B%88%EB%8B%A4.&location=%EC%83%98%ED%94%8C%20%EC%9B%A8%EB%94%A9%ED%99%80" target="_blank" rel="noopener">구글 캘린더에 추가</a>
          <a class="btn secondary" href="webcal://raw.githubusercontent.com/iinow/invitation/main/wedding.ics">아이폰/맥 캘린더 추가</a>
        </div>
      </div>

      <div class="account">
        <div class="bank">신한은행</div>
        <div class="num">110-382-372247</div>
        <div class="actions">
          <a class="btn" href="supertoss://send?amount=10000&bank=%EC%8B%A0%ED%95%9C&accountno=110382372247">토스로 이체하기</a>
          <a class="btn secondary" href="#" onclick="navigator.clipboard.writeText('110-382-372247');alert('계좌번호가 복사되었습니다.');return false;">계좌번호 복사</a>
        </div>
      </div>
    </section>

    <p class="footer">함께해 주시는 마음에 감사드립니다 💍</p>
  </main>
</body>
</html>
